{{- if .Values.kongIngress.enabled }}
---
# Kong Ingress — receives /mcp requests from nginx Rule 1
# strip-path: true + pathPrefix → backend receives /mcp
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "hdc-nexus-mcp-server.fullname" . }}-mcp
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hdc-nexus-mcp-server.labels" . | nindent 4 }}
  annotations:
    konghq.com/strip-path: "true"
    konghq.com/plugins: {{ .Values.kongIngress.plugins | quote }}
spec:
  ingressClassName: kong
  rules:
    - http:
        paths:
          - path: {{ .Values.kongIngress.pathPrefix }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "hdc-nexus-mcp-server.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
{{- end }}
