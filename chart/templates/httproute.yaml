{{- if .Values.httpRoute.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "hdc-nexus-mcp-server.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hdc-nexus-mcp-server.labels" . | nindent 4 }}
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ .Values.httpRoute.gateway.name }}
      namespace: {{ .Values.httpRoute.gateway.namespace }}
      sectionName: http
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ .Values.httpRoute.gateway.name }}
      namespace: {{ .Values.httpRoute.gateway.namespace }}
      sectionName: https
  hostnames:
    - {{ .Values.httpRoute.hostname | quote }}
  rules:
    {{- if .Values.kongIngress.enabled }}
    # Route /mcp → Kong proxy (key-auth)
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.httpRoute.pathPrefix }}/mcp
      backendRefs:
        - group: ""
          kind: Service
          name: {{ .Values.kongIngress.proxyServiceName }}
          namespace: {{ .Values.kongIngress.proxyServiceNamespace }}
          port: {{ .Values.kongIngress.proxyServicePort }}
          weight: 1
    {{- end }}
    # Catch-all (health + direct access when Kong disabled)
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.httpRoute.pathPrefix }}
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - group: ""
          kind: Service
          name: {{ include "hdc-nexus-mcp-server.fullname" . }}
          port: {{ .Values.service.port }}
          weight: 1
{{- end }}
