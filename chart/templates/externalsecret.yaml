{{- if .Values.nexus.externalSecret.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "hdc-nexus-mcp-server.fullname" . }}-nexus-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hdc-nexus-mcp-server.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: {{ .Values.nexus.externalSecret.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.nexus.externalSecret.secretStore.name }}
    kind: {{ .Values.nexus.externalSecret.secretStore.kind }}
  target:
    name: {{ include "hdc-nexus-mcp-server.fullname" . }}-nexus-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: NEXUS_USER
      remoteRef:
        key: {{ .Values.nexus.externalSecret.remoteKey }}
        property: {{ .Values.nexus.externalSecret.remoteProperties.user }}
    - secretKey: NEXUS_PASSWORD
      remoteRef:
        key: {{ .Values.nexus.externalSecret.remoteKey }}
        property: {{ .Values.nexus.externalSecret.remoteProperties.password }}
{{- end }}
---
{{- if .Values.imagePullSecret.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "hdc-nexus-mcp-server.fullname" . }}-pull-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hdc-nexus-mcp-server.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.imagePullSecret.secretStore.name }}
    kind: {{ .Values.imagePullSecret.secretStore.kind }}
  target:
    name: {{ include "hdc-nexus-mcp-server.fullname" . }}-pull-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      data:
        .dockerconfigjson: "{{ `{{ .dockerconfig }}` }}"
  data:
    - secretKey: dockerconfig
      remoteRef:
        key: {{ .Values.imagePullSecret.remoteKey }}
{{- end }}
